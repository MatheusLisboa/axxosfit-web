<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Shield/Indigo High Quality Gradient -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Neon Glow Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Inner Glow Shadow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base with rx="120" for high spec PWA layout -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Premium Neon Border -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="url(#borderGrad)" stroke-width="12" opacity="0.85" />
  
  <!-- Subtle inner background accent pattern -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#2e1065" stroke-width="2" opacity="0.3" stroke-dasharray="10 10" />

  <!-- The AXOS fitness crown / emblem -->
  <!-- Combining "A" (Peak) and athletic lightning/helix wings for speed & power -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Right stylized athletic ribbon -->
    <path d="M128 32 L220 224 L170 224 L128 130 L86 224 L36 224 Z" fill="url(#emblemGrad)" />
    <!-- Dynamic power lines / barbell aesthetic intersecting -->
    <path d="M60 160 L196 160" stroke="url(#borderGrad)" stroke-width="14" stroke-linecap="round" />
    <!-- Small star reflecting premium success/super-admin and quality -->
    <path d="M128 100 L134 116 L150 116 L137 126 L142 142 L128 132 L114 142 L119 126 L106 116 L122 116 Z" fill="#ffffff" />
  </g>

  <!-- Clean Tech aesthetic markings in the corner -->
  <circle cx="256" cy="450" r="6" fill="#818cf8" />
  <path d="M226 450 L286 450" stroke="#818cf8" stroke-width="2" opacity="0.5" />
</svg>
